name: Build Prebuilt Libraries

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact_prefix:
        description: 'Prefix used for uploaded artifacts'
        value: 'zvec-prebuilt'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            lib_name: libzvec_c_api.dylib
          # - target: x86_64-apple-darwin
          #   os: macos-13
          #   lib_name: libzvec_c_api.dylib
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            lib_name: libzvec_c_api.so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            lib_name: libzvec_c_api.so
          - target: x86_64-pc-windows-msvc
            os: windows-2025
            lib_name: zvec_c_api.dll
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup sccache
        # Not on Windows: bundled Arrow's CMake auto-detects sccache on PATH and
        # wraps lib.exe/link.exe, stalling on the huge tail libs (see ci.yml).
        if: runner.os != 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Use manylinux_2_28 container for Linux x64 to ensure broad GLIBC compatibility.
      # Mount the entire workspace (not just vendor/zvec) so that submodule .git
      # files can resolve to the parent repo's .git/modules/ directory — needed
      # by zvec's apply_patch_once() which calls `git apply` inside arrow.
      - name: Build zvec C library (Linux x64 manylinux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace/vendor/zvec \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -c "
              dnf install -y cmake gcc-c++ git libaio-devel
              mkdir -p build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_C_BINDINGS=ON -DBUILD_TOOLS=OFF
              cmake --build . --config Release -j\$(nproc)
            "
        shell: bash

      - name: Build zvec C library (Unix)
        if: runner.os != 'Windows' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          cd vendor/zvec

          if [[ "${{ matrix.target }}" == *apple* ]]; then
            NPROC=$(sysctl -n hw.ncpu 2>/dev/null || echo 2)
          else
            NPROC=$(nproc 2>/dev/null || echo 2)
          fi

          python -m pip install --upgrade pip pybind11==3.0 cmake==3.30.0 ninja==1.11.1 scikit-build-core setuptools_scm

          # Set macOS deployment target to support macOS 14.x (Sonoma) and later
          export MACOSX_DEPLOYMENT_TARGET="14.0"

          CMAKE_GENERATOR="Unix Makefiles" \
          CMAKE_BUILD_PARALLEL_LEVEL="$NPROC" \
          python -m pip install -v . \
            --no-build-isolation \
            --config-settings='cmake.define.BUILD_TOOLS="ON"'
        shell: bash

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake and Ninja (Windows)
        # Pin the same versions ci.yml uses; cmake 3.30.0 (not 4.x) avoids the
        # old cmake_minimum_required policy errors.
        if: runner.os == 'Windows'
        run: pip install cmake==3.30.0 ninja==1.11.1
        shell: pwsh

      - name: Build zvec C library (Windows)
        if: runner.os == 'Windows'
        run: |
          cd vendor/zvec
          mkdir build -ErrorAction SilentlyContinue
          cd build
          # Fully aligned with ci.yml / zvec-go's proven Windows build: minimal
          # flags, pwsh, pinned cmake/ninja, no sccache. The previous
          # BUILD_*_SHARED=OFF / CMAKE_MSVC_RUNTIME_LIBRARY overrides changed the
          # tail link behaviour and stalled the build for hours.
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_C_BINDINGS=ON -G Ninja
          cmake --build . --config Release --parallel --target zvec_c_api
        shell: pwsh

      - name: Package library (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          ZVEC_LIB_DIR="$(find vendor/zvec/build -name '${{ matrix.lib_name }}' -exec dirname {} \; | head -1)"
          cp "$ZVEC_LIB_DIR/${{ matrix.lib_name }}" dist/
          # Also copy any symlinks or versioned libraries
          find "$ZVEC_LIB_DIR" -name 'libzvec_c_api*' -exec cp -P {} dist/ \; 2>/dev/null || true
          echo "${{ matrix.target }}" > dist/TARGET
          tar czf zvec-prebuilt-${{ matrix.target }}.tar.gz -C dist .
          ls -lh zvec-prebuilt-${{ matrix.target }}.tar.gz
        shell: bash

      - name: Package library (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p dist
          # Find the DLL and import lib
          find vendor/zvec/build -name 'zvec_c_api.dll' -exec cp {} dist/ \; 2>/dev/null || true
          find vendor/zvec/build -name 'zvec_c_api.lib' -exec cp {} dist/ \; 2>/dev/null || true
          find vendor/zvec/build -name 'zvec_c_api.dll' -path '*/Release/*' -exec cp {} dist/ \; 2>/dev/null || true
          find vendor/zvec/build -name 'zvec_c_api.lib' -path '*/Release/*' -exec cp {} dist/ \; 2>/dev/null || true
          echo "${{ matrix.target }}" > dist/TARGET
          tar czf zvec-prebuilt-${{ matrix.target }}.tar.gz -C dist .
          ls -lh zvec-prebuilt-${{ matrix.target }}.tar.gz
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zvec-prebuilt-${{ matrix.target }}
          path: zvec-prebuilt-${{ matrix.target }}.tar.gz
          retention-days: 7
