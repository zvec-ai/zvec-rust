name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.70"
      - run: cargo check --workspace --lib
        env:
          ZVEC_AUTO_BUILD: "0"

  check-and-test:
    name: Check & Test (${{ matrix.platform }})
    needs: [fmt, msrv]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-15
          # - platform: macos-x64
          #   os: macos-13
          - platform: linux-x64
            os: ubuntu-24.04
          - platform: linux-arm64
            os: ubuntu-24.04-arm
          - platform: windows-x64
            os: windows-2025
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup sccache
        # Not on Windows: bundled Arrow's CMake auto-detects sccache on PATH and
        # wraps even lib.exe/link.exe; on the huge tail libs (zvec.lib bundling
        # Arrow) it stalls uploading to the GHA cache backend and hangs the build.
        # zvec-go builds fine in ~47min precisely because it never installs
        # sccache on Windows. sccache stays enabled for Unix/macOS.
        if: runner.os != 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libaio-dev
        shell: bash

      - name: Build zvec C library (Unix)
        if: runner.os != 'Windows'
        run: |
          cd vendor/zvec
          mkdir -p build && cd build

          if [[ "${{ matrix.platform }}" == macos-* ]]; then
            NPROC=$(sysctl -n hw.ncpu 2>/dev/null || echo 2)
          else
            NPROC=$(nproc 2>/dev/null || echo 2)
          fi

          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_C_BINDINGS=ON -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TOOLS=OFF -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          # Since zvec #602, DISKANN_SUPPORTED packs the DiskANN sources into
          # zvec_core (which zvec_c_api whole-archives), so --target zvec_c_api
          # already produces a complete, self-contained lib (DiskANN included on
          # linux-x86_64). No transient patch needed.
          cmake --build . --config Release --parallel "$NPROC" --target zvec_c_api
        shell: bash

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake and Ninja (Windows)
        # Pin the exact CMake/Ninja versions zvec-go uses. cmake 3.30.0 (not the
        # runner's 4.x) avoids the old cmake_minimum_required policy errors, so
        # no CMAKE_POLICY_VERSION_MINIMUM shims are needed.
        if: runner.os == 'Windows'
        run: pip install cmake==3.30.0 ninja==1.11.1
        shell: pwsh

      - name: Fix link.exe conflict with Git Bash
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "C:\Program Files\Git\usr\bin\link.exe") {
            Rename-Item "C:\Program Files\Git\usr\bin\link.exe" "link_git.exe"
            Write-Host "Renamed Git link.exe to avoid MSVC linker conflict"
          }
        shell: pwsh

      - name: Build zvec C library (Windows)
        if: runner.os == 'Windows'
        run: |
          cd vendor/zvec
          mkdir build -ErrorAction SilentlyContinue
          cd build
          # Fully aligned with zvec-go's proven-working Windows build: same
          # runner (windows-2025), same pinned cmake/ninja, same minimal flags,
          # same pwsh shell, same --target. No sccache on Windows.
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_C_BINDINGS=ON -G Ninja
          cmake --build . --target zvec_c_api -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Set library path (Unix)
        if: runner.os != 'Windows'
        run: |
          ZVEC_LIB_DIR="$(cd vendor/zvec/build/lib 2>/dev/null && pwd || echo '')"
          echo "ZVEC_LIB_DIR=$ZVEC_LIB_DIR" >> $GITHUB_ENV

          if [[ "${{ matrix.platform }}" == macos-* ]]; then
            echo "DYLD_LIBRARY_PATH=$ZVEC_LIB_DIR" >> $GITHUB_ENV
          else
            echo "LD_LIBRARY_PATH=$ZVEC_LIB_DIR" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Set library path (Windows)
        if: runner.os == 'Windows'
        run: |
          # Collect all .lib and .dll files so we can find the actual output location
          Write-Host "Searching for zvec_c_api library files..."
          $found = Get-ChildItem -Path "vendor/zvec/build" -Recurse -Include "zvec_c_api.lib","zvec_c_api.dll" -ErrorAction SilentlyContinue
          foreach ($f in $found) { Write-Host "  Found: $($f.FullName)" }

          # Create a canonical lib directory and copy all library files there
          $canonicalDir = (Resolve-Path "vendor/zvec/build").Path + "\lib"
          New-Item -ItemType Directory -Force -Path $canonicalDir | Out-Null

          foreach ($f in $found) {
            if ($f.DirectoryName -ne $canonicalDir) {
              Copy-Item $f.FullName -Destination $canonicalDir -Force
              Write-Host "  Copied $($f.Name) -> $canonicalDir"
            } else {
              Write-Host "  Already in place: $($f.Name)"
            }
          }

          if (Test-Path "$canonicalDir\zvec_c_api.lib") {
            Write-Host "Library directory: $canonicalDir"
            echo "ZVEC_LIB_DIR=$canonicalDir" >> $env:GITHUB_ENV
            echo "$canonicalDir" >> $env:GITHUB_PATH
          } else {
            Write-Host "::error::Could not find zvec_c_api.lib anywhere under vendor/zvec/build"
            exit 1
          }
        shell: pwsh

      - name: Clippy lint
        run: cargo clippy --workspace --all-targets -- -D warnings
        shell: bash

      - name: Run unit tests
        run: cargo test --workspace --lib -- --nocapture
        shell: bash

      - name: Run integration tests
        run: cargo test --workspace --tests -- --nocapture
        shell: bash

      - name: Run doc tests
        run: cargo test --workspace --doc
        shell: bash

      - name: Run examples
        run: cargo run --example basic
        shell: bash

  audit:
    name: Security Audit
    needs: check-and-test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit || true
        shell: bash

  sync-check:
    name: Upstream Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check zvec C-API version compatibility
        run: |
          echo "Checking zvec-sys FFI declarations against upstream C-API headers..."
          UPSTREAM_VERSION=$(grep '^version' zvec-sys/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "zvec-sys version: $UPSTREAM_VERSION"

          ZVEC_VERSION=$(grep '^version' zvec/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "zvec version: $ZVEC_VERSION"

          if [ "$UPSTREAM_VERSION" != "$ZVEC_VERSION" ]; then
            echo "::warning::zvec-sys ($UPSTREAM_VERSION) and zvec ($ZVEC_VERSION) versions are out of sync"
          else
            echo "✅ Versions are in sync: $UPSTREAM_VERSION"
          fi
        shell: bash
